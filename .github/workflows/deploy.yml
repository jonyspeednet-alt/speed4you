name: Deploy to Production Server

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Prepare deployment package
        run: node scripts/prepare-deploy.cjs

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: |
            server-deploy/
            scripts/deploy.sh
          retention-days: 1

      - name: Notify deployment ready
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 Deployment package ready"
          echo "🔔 Local webhook listener will handle deployment"
          echo "📍 Make sure webhook listener is running on your local machine"

